name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup MSVC (Windows)
        if: matrix.label == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Sync version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          node -e "
            const fs = require('fs');
            for (const f of ['package.json', 'src-tauri/tauri.conf.json']) {
              const s = fs.readFileSync(f, 'utf8');
              fs.writeFileSync(f, s.replace(/\"version\": \"[^\"]*\"/, '\"version\": \"'+'$VERSION'+'\"'));
            }
          "

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run build

      - name: Stage artifact (Windows)
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staged | Out-Null
          Copy-Item "src-tauri/target/release/nscb-desktop.exe" "staged/nscb-desktop-windows-amd64.exe"

      - name: Stage artifact (Linux)
        if: matrix.label == 'linux'
        run: |
          mkdir -p staged
          cp src-tauri/target/release/bundle/appimage/*.AppImage staged/nscb-desktop-linux-amd64.AppImage
          cp src-tauri/target/release/bundle/deb/*.deb staged/nscb-desktop-linux-amd64.deb

      - name: Stage artifact (macOS)
        if: matrix.label == 'macos'
        run: |
          mkdir -p staged
          cp src-tauri/target/release/bundle/dmg/*.dmg staged/nscb-desktop-macos-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nscb-desktop-${{ matrix.label }}
          path: staged/
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Flatten release artifacts
        run: |
          mkdir -p artifacts
          find release-artifacts -type f -exec cp {} artifacts/ \;
          ls -la artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --repo "${{ github.repository }}" --clobber
          else
            gh release create "$tag" artifacts/* --repo "${{ github.repository }}" --title "Release $tag" --generate-notes
          fi
